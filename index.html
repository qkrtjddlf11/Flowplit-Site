<!DOCTYPE html>
<html lang="ko">

    <meta name="theme-color" content="#667eea">
    <link rel="canonical" href="https://flowplit.app/">

    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Flowplit - 스마트한 여행 플래너">
    <meta property="og:description" content="일정 관리, 더치페이 정산, 준비물 체크리스트까지. 여행의 모든 것을 한곳에서.">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary">

    <meta name="twitter:description" content="일정 관리, 더치페이 정산, 준비물 체크리스트까지. 여행의 모든 것을 한곳에서.">

    <!-- Apple Smart App Banner -->
    <meta name="apple-itunes-app" content="app-id=6740486566">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            text-align: center;
            color: white;
            max-width: 500px;
        }
        .logo {
            font-size: 72px;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        .tagline {
            font-size: 1.2rem;
            opacity: 0.9;
            margin-bottom: 30px;
        }
        .features {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }
        .feature {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        .feature-icon {
            font-size: 32px;
        }
        .feature-text {
            font-size: 0.9rem;
            opacity: 0.9;
        }
        .app-store-btn {
            display: inline-block;
            background: white;
            color: #333;
            padding: 15px 40px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1rem;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .app-store-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .app-store-btn:focus-visible {
            outline: 3px solid white;
            outline-offset: 3px;
        }
        .coming-soon {
            margin-top: 15px;
            font-size: 0.9rem;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <main class="container" role="main">
        <div class="logo" aria-hidden="true">✈️</div>
        <h1>Flowplit</h1>
        <p class="tagline">스마트한 여행 플래너</p>

        <section class="features" aria-label="주요 기능">
            <div class="feature">
                <span class="feature-icon" aria-hidden="true">📅</span>
                <span class="feature-text">일정 관리</span>
            </div>
            <div class="feature">
                <span class="feature-icon" aria-hidden="true">💰</span>
                <span class="feature-text">더치페이</span>
            </div>
            <div class="feature">
                <span class="feature-icon" aria-hidden="true">🎒</span>
                <span class="feature-text">준비물 체크</span>
            </div>
            <div class="feature">
                <span class="feature-icon" aria-hidden="true">☁️</span>
                <span class="feature-text">클라우드 동기화</span>
            </div>
        </section>

        <a href="https://apps.apple.com/app/flowplit/id6740486566" class="app-store-btn" aria-label="App Store에서 Flowplit 다운로드">
            App Store에서 다운로드
        </a>
        <p class="coming-soon">Android 버전 준비 중</p>
    </main>
</body>
